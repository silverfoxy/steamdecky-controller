name: Build SteamDecky Controller Plugin

on:
  push:
    branches: [ '**' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: plugin/package-lock.json

    - name: Install npm dependencies
      working-directory: plugin
      run: npm ci

    - name: Build TypeScript
      working-directory: plugin
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check Python syntax
      working-directory: plugin
      run: |
        python -m py_compile main.py
        python -m py_compile controller_forwarder.py
        echo "✓ Python files validated"

    - name: Package plugin
      run: |
        mkdir -p steamdecky-controller

        # Copy plugin files
        cp plugin/main.py steamdecky-controller/
        cp plugin/controller_forwarder.py steamdecky-controller/
        cp plugin/plugin.json steamdecky-controller/
        cp plugin/package.json steamdecky-controller/
        cp -r plugin/dist steamdecky-controller/
        cp README.md steamdecky-controller/ 2>/dev/null || true
        cp LICENSE steamdecky-controller/ 2>/dev/null || true

        echo "✓ Plugin packaged (uses system Python + evdev)"
        ls -la steamdecky-controller/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: steamdecky-controller
        path: steamdecky-controller/

    - name: Create release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
      run: zip -r steamdecky-controller.zip steamdecky-controller/

    - name: Upload to release
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: steamdecky-controller.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
